<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bogdane</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap');

body{
  min-height:100vh;
  background:#0a0a0f;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:'Inter',sans-serif;
}

canvas#particles{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
}

.container{
  position:relative;z-index:1;
  text-align:center;
  padding:20px;
  max-width:700px;
  width:95vw;
}

.card-wrapper{
  perspective:1000px;
  margin-bottom:36px;
}

.card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  transform-style:preserve-3d;
  transition:transform 0.1s ease-out;
  box-shadow:
    0 0 30px rgba(197,51,51,0.15),
    0 20px 60px rgba(0,0,0,0.5);
  cursor:grab;
  animation: float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0) rotateX(0) rotateY(0)}
  25%{transform:translateY(-8px) rotateX(1.5deg) rotateY(-1deg)}
  50%{transform:translateY(-4px) rotateX(0deg) rotateY(1.5deg)}
  75%{transform:translateY(-10px) rotateX(-1.5deg) rotateY(-0.5deg)}
}

.card:hover{
  animation-play-state:paused;
}

.card img{
  width:100%;
  display:block;
  border-radius:16px;
}

.card .shine{
  position:absolute;top:0;left:0;right:0;bottom:0;
  border-radius:16px;
  background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 50%,transparent 100%);
  pointer-events:none;
  transition:opacity 0.3s;
}

.card .edge-glow{
  position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;
  border-radius:18px;
  z-index:-1;
  background:linear-gradient(135deg,#C53535,#3B82F6,#EC4899,#C53535);
  background-size:300% 300%;
  animation:glowshift 4s ease infinite;
  filter:blur(8px);
  opacity:0.5;
}

@keyframes glowshift{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}

.text-section{
  position:relative;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,5vw,36px);
  font-weight:700;
  letter-spacing:3px;
  color:#fff;
  margin-bottom:12px;
  opacity:0;
  animation:fadeUp 1s ease 0.5s forwards;
  text-shadow:0 0 40px rgba(197,51,51,0.3);
}

.subtitle{
  font-size:clamp(14px,3vw,18px);
  color:rgba(255,255,255,0.6);
  font-weight:300;
  letter-spacing:1px;
  opacity:0;
  animation:fadeUp 1s ease 0.8s forwards;
}

.flag{
  display:inline-flex;
  gap:0;
  margin-top:20px;
  opacity:0;
  animation:fadeUp 1s ease 1.1s forwards;
  border-radius:4px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
}
.flag span{display:block;width:36px;height:8px}
.flag .r{background:#C6363C}
.flag .b{background:#0C4076}
.flag .w{background:#EEEEEE}

.emoji-row{
  margin-top:16px;
  font-size:20px;
  letter-spacing:8px;
  opacity:0;
  animation:fadeUp 1s ease 1.4s forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

@media(max-width:500px){
  .container{padding:12px}
  .card{border-radius:12px}
}
</style>
</head>

<script>
// Particle system
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){this.reset()}
  reset(){
    this.x = Math.random()*W;
    this.y = Math.random()*H;
    this.size = Math.random()*2+0.5;
    this.speedY = -Math.random()*0.3-0.1;
    this.speedX = (Math.random()-0.5)*0.2;
    this.opacity = Math.random()*0.4+0.1;
    const colors = ['197,51,51','59,130,246','236,72,153','255,255,255'];
    this.color = colors[Math.floor(Math.random()*colors.length)];
  }
  update(){
    this.y += this.speedY;
    this.x += this.speedX;
    if(this.y < -10) {this.y = H+10; this.x = Math.random()*W;}
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${this.color},${this.opacity})`;
    ctx.fill();
  }
}

for(let i=0; i<60; i++) particles.push(new Particle());

function animateParticles(){
  ctx.clearRect(0,0,W,H);
  particles.forEach(p=>{p.update();p.draw()});
  requestAnimationFrame(animateParticles);
}
animateParticles();

// 3D tilt on mouse/touch
const card = document.getElementById('card');
const shine = document.getElementById('shine');

function handleMove(x, y){
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const dx = (x - cx) / (rect.width/2);
  const dy = (y - cy) / (rect.height/2);
  const rotY = dx * 12;
  const rotX = -dy * 8;

  card.style.animation = 'none';
  card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.02)`;
  
  const shineX = ((x - rect.left) / rect.width) * 100;
  const shineY = ((y - rect.top) / rect.height) * 100;
  shine.style.background = `radial-gradient(circle at ${shineX}% ${shineY}%, rgba(255,255,255,0.2) 0%, transparent 60%)`;
}

function handleEnd(){
  card.style.transform = '';
  card.style.animation = 'float 4s ease-in-out infinite';
  shine.style.background = 'linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 50%)';
}

document.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
document.addEventListener('mouseleave', handleEnd);
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  handleMove(t.clientX, t.clientY);
}, {passive:true});
document.addEventListener('touchend', handleEnd);
</script>
</body>
